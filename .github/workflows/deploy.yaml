name: CI CD with gitHub Actions Hehe

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: deploy via SSH
        uses: appleboy/ssh-action@v1.1.0

        with:
          host: ${{ secrets.SSH_HOST}}
          username: ubuntu
          key: ${{ secrets.SSH_KEY}}
          script: |
            cd /home/ubuntu/NGINXLearning
            git pull 
            sudo docker compose up -d --build
